<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#1e1b4b"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="#312e81" stroke-width="4"/>

  <!-- Shield shape -->
  <path d="M256 56 L442 104 L442 272 C442 388 344 456 256 456 C168 456 70 388 70 272 L70 104 Z"
        fill="#312e81" stroke="#6366f1" stroke-width="10" stroke-linejoin="round"/>

  <!-- Claw marks — three diagonal slashes -->
  <g stroke="#818cf8" stroke-width="12" stroke-linecap="round" opacity="0.85">
    <line x1="120" y1="160" x2="210" y2="320"/>
    <line x1="152" y1="140" x2="242" y2="300"/>
    <line x1="184" y1="120" x2="274" y2="280"/>
  </g>

  <!-- Network monitoring node -->
  <circle cx="360" cy="160" r="28" fill="#1e1b4b" stroke="#6366f1" stroke-width="8"/>
  <circle cx="360" cy="160" r="10" fill="#818cf8"/>

  <!-- Small connection dots -->
  <circle cx="310" cy="130" r="5" fill="#6366f1"/>
  <circle cx="390" cy="120" r="4" fill="#6366f1"/>
  <circle cx="400" cy="180" r="4" fill="#6366f1"/>
</svg>
